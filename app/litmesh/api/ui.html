<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LitMesh Admin</title>
<style>
:root{--bg:#0d1117;--fg:#c9d1d9;--accent:#58a6ff;--border:#30363d;--hover:#161b22;--red:#f85149;--green:#3fb950;--yellow:#d2991d;--dim:#8b949e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.5}
header{background:#161b22;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px}
header h1{font-size:18px;color:var(--accent)}
nav{display:flex;gap:4px;overflow-x:auto;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--bg)}
nav button{padding:6px 14px;border:1px solid transparent;border-radius:6px;background:none;color:var(--dim);cursor:pointer;white-space:nowrap;font-size:13px}
nav button:hover{background:var(--hover);color:var(--fg)}
nav button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
main{padding:20px;max-width:1400px;margin:0 auto}
.panel{display:none}
.panel.active{display:block}
.card{border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;background:#0d1117}
.card h3{font-size:15px;margin-bottom:6px}
.card .meta{font-size:12px;color:var(--dim);margin-bottom:4px}
.card .text{font-size:13px;margin-top:4px;max-height:120px;overflow-y:auto}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;margin-right:4px}
.badge-green{background:var(--green);color:#000}
.badge-red{background:var(--red);color:#fff}
.badge-yellow{background:var(--yellow);color:#000}
.badge-blue{background:var(--accent);color:#fff}
.badge-dim{background:var(--border);color:var(--dim)}
.actions{margin-top:8px;display:flex;gap:8px}
.actions button{padding:4px 12px;border:1px solid var(--border);border-radius:4px;background:var(--hover);color:var(--fg);cursor:pointer;font-size:12px}
.actions button:hover{background:var(--accent);color:#fff}
.actions button.danger:hover{background:var(--red)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border)}
th{color:var(--dim);font-weight:500;position:sticky;top:0;background:var(--bg)}
tr:hover{background:var(--hover)}
.search{margin-bottom:16px}
.search input{padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);width:300px;font-size:14px}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.stat{padding:12px 20px;border:1px solid var(--border);border-radius:8px;text-align:center;min-width:80px}
.stat .num{font-size:24px;font-weight:700;color:var(--accent)}
.stat .label{font-size:11px;color:var(--dim);margin-top:2px}
.inbox-item{border-left:3px solid var(--border);padding:10px 14px;margin-bottom:8px;border-radius:0 6px 6px 0}
.inbox-item.high{border-left-color:var(--red)}
.inbox-item.medium{border-left-color:var(--yellow)}
.inbox-item.low{border-left-color:var(--dim)}
pre{background:#161b22;padding:12px;border-radius:6px;overflow:auto;font-size:12px;max-height:500px}
</style>
</head>
<body>
<header><h1>LitMesh Admin</h1><span id="stat-summary" style="font-size:12px;color:var(--dim)"></span></header>
<nav id="tabs">
  <button data-panel="papers" class="active">Papers</button>
  <button data-panel="claims">Claims</button>
  <button data-panel="sections">Sections</button>
  <button data-panel="concepts">Concepts</button>
  <button data-panel="inbox">Inbox</button>
  <button data-panel="bridges">Bridges</button>
  <button data-panel="traces">Traces</button>
  <button data-panel="series">Series</button>
  <button data-panel="stats">Stats</button>
</nav>
<main id="content"></main>

<script>
const API = '/';
const panels = {};

function $(sel){return document.querySelector(sel)}
function $$(sel){return document.querySelectorAll(sel)}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s||'';
  return d.innerHTML;
}

function badge(text, cls) {
  return `<span class="badge badge-${cls}">${esc(text)}</span>`;
}

// ---- Tab switching ----
$$('#tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    $$('#tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadPanel(btn.dataset.panel);
  });
});

async function loadPanel(name) {
  const main = $('#content');
  main.innerHTML = '<p style="color:var(--dim)">Loading...</p>';
  try {
    if (name === 'papers') await renderPapers(main);
    else if (name === 'claims') await renderClaims(main);
    else if (name === 'sections') await renderSections(main);
    else if (name === 'concepts') await renderConcepts(main);
    else if (name === 'inbox') await renderInbox(main);
    else if (name === 'bridges') await renderBridges(main);
    else if (name === 'traces') await renderTraces(main);
    else if (name === 'series') await renderSeries(main);
    else if (name === 'stats') await renderStats(main);
  } catch(e) {
    main.innerHTML = `<p style="color:var(--red)">Error: ${esc(e.message)}</p>`;
  }
}

// ---- Papers ----
async function renderPapers(main) {
  const data = await fetchJSON(API + 'papers');
  main.innerHTML = `<h2>Papers (${data.count})</h2>
    <div class="search"><input id="filter-papers" placeholder="Search titles..." oninput="renderPaperList()"></div>
    <div id="paper-list"></div>`;
  window._papers = data.papers;
  renderPaperList();
}

function renderPaperList() {
  const q = ($('#filter-papers')?.value||'').toLowerCase();
  const papers = (window._papers||[]).filter(p => !q || p.title.toLowerCase().includes(q));
  $('#paper-list').innerHTML = papers.map(p => `
    <div class="card">
      <h3>${esc(p.title)}</h3>
      <div class="meta">${esc(p.authors)} · ${p.year||'?'} · ${badge(p.research_type, 'dim')} · ${esc(p.main_framework)}</div>
      <div class="meta">Paper ID: ${esc(p.paper_id)} · Graph: ${esc(p.graph_id)} · Pages: ${p.page_count}</div>
      <div class="text">${esc(p.abstract||p.abstract_summary||'No abstract')}</div>
    </div>`).join('') || '<p style="color:var(--dim)">No papers found</p>';
}

// ---- Claims ----
async function renderClaims(main) {
  const data = await fetchJSON(API + 'claims?limit=100');
  main.innerHTML = `<h2>Claims (${data.count})</h2>
    <div style="margin-bottom:12px">
      <select id="claim-filter-type" onchange="renderClaimList()">
        <option value="">All types</option>
        ${[...new Set(data.claims.map(c=>c.claim_type))].map(t=>`<option>${t}</option>`).join('')}
      </select>
    </div>
    <div id="claim-list"></div>`;
  window._claims = data.claims;
  renderClaimList();
}

function renderClaimList() {
  const type = $('#claim-filter-type')?.value||'';
  const claims = (window._claims||[]).filter(c => !type || c.claim_type === type);
  $('#claim-list').innerHTML = claims.map(c => `
    <div class="card">
      <div class="meta">${badge(c.claim_type, 'blue')} ${badge(c.status, c.status==='active'?'green':'yellow')} ${badge(c.importance, 'dim')} · conf: ${(c.extraction_confidence*100).toFixed(0)}%</div>
      <div class="text">${esc(c.claim_text)}</div>
      <div class="meta">ID: ${esc(c.claim_id)} · Paper: ${esc(c.paper_id)}</div>
    </div>`).join('') || '<p style="color:var(--dim)">No claims</p>';
}

// ---- Sections ----
async function renderSections(main) {
  const papers = await fetchJSON(API + 'papers');
  if (!papers.papers.length) { main.innerHTML='<p>No papers</p>'; return; }
  const pid = papers.papers[0].paper_id;
  const secs = await fetchJSON(API + `papers/${pid}/sections`);
  main.innerHTML = `<h2>Sections</h2>
    <select id="section-paper" onchange="loadSections()">${papers.papers.map(p => `<option value="${p.paper_id}">${esc(p.title)}</option>`).join('')}</select>
    <div id="section-list" style="margin-top:12px"></div>`;
  window._sections = secs.sections;
  renderSectionList();
}

async function loadSections() {
  const pid = $('#section-paper').value;
  const secs = await fetchJSON(API + `papers/${pid}/sections`);
  window._sections = secs.sections;
  renderSectionList();
}

function renderSectionList() {
  $('#section-list').innerHTML = (window._sections||[]).map(s => `
    <div class="card">
      <h3>${esc(s.heading)}</h3>
      <div class="meta">${s.heading_path||''} · pp ${s.page_start}-${s.page_end||'?'} · ${badge(s.heading_level, 'dim')}</div>
      <div class="text">${esc((s.raw_text||'').substring(0,300))}</div>
    </div>`).join('');
}

// ---- Concepts ----
async function renderConcepts(main) {
  const data = await fetchJSON(API + 'concepts');
  const byNs = {};
  data.concepts.forEach(c => { const ns = c.namespace||'other'; if(!byNs[ns]) byNs[ns]=[]; byNs[ns].push(c); });
  main.innerHTML = `<h2>Concepts (${data.count})</h2><div id="concept-list"></div>`;
  let html = '';
  for (const [ns, concepts] of Object.entries(byNs)) {
    html += `<h3 style="margin-top:16px;color:var(--accent)">${esc(ns)} (${concepts.length})</h3>`;
    html += concepts.map(c => `
      <div class="card" style="border-left:3px solid var(--accent)">
        <h3>${esc(c.label_zh)} <span style="color:var(--dim);font-size:12px">${esc(c.concept_key)}</span></h3>
        <div class="meta">${badge(c.namespace,'blue')} ${badge(c.status,'green')} · Graph: ${esc(c.graph_id)}</div>
        <div class="text">${esc(c.definition||'No definition')}</div>
        ${c.aliases ? `<div class="meta">Aliases: ${esc(c.aliases)}</div>` : ''}
      </div>`).join('');
  }
  $('#concept-list').innerHTML = html;
}

// ---- Inbox ----
async function renderInbox(main) {
  const data = await fetchJSON(API + 'inbox');
  main.innerHTML = `<h2>Review Inbox (${data.count} pending)</h2>
    <div style="margin-bottom:12px">
      <select id="inbox-filter" onchange="renderInboxList()">
        <option value="">All types</option>
        <option value="extraction">Extraction</option>
        <option value="concept">Concept</option>
        <option value="bridge">Bridge</option>
        <option value="conflict">Conflict</option>
      </select>
    </div>
    <div id="inbox-list"></div>`;
  window._inbox = data.items;
  renderInboxList();
}

function renderInboxList() {
  const type = $('#inbox-filter')?.value||'';
  const items = (window._inbox||[]).filter(i => !type || i.inbox_type === type);
  const prioClass = {'critical':'high','high':'high','medium':'medium','low':'low'};
  $('#inbox-list').innerHTML = items.map(i => `
    <div class="inbox-item ${prioClass[i.priority]||'low'}">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <div>
          <strong>${esc(i.title)}</strong>
          <div class="meta">${badge(i.inbox_type,'blue')} ${badge(i.item_type,'dim')} ${badge(i.priority, prioClass[i.priority]||'dim')} · conf: ${(i.extraction_confidence*100).toFixed(0)}%</div>
          <div class="text">${esc(i.description||i.source_text||'')}</div>
        </div>
        <div class="actions" style="flex-shrink:0">
          <button onclick="inboxAction('${i.inbox_id}','approve')">&#10003; Approve</button>
          <button class="danger" onclick="inboxAction('${i.inbox_id}','reject')">&#10007; Reject</button>
          <button onclick="inboxAction('${i.inbox_id}','downgrade')">&darr; Lower Conf</button>
        </div>
      </div>
    </div>`).join('') || '<p style="color:var(--dim)">No pending items</p>';
}

async function inboxAction(inboxId, action) {
  const notes = prompt('Notes (optional):')||'';
  const endpoint = action === 'downgrade' ? `inbox/${inboxId}/downgrade` :
                   action === 'approve' ? `inbox/${inboxId}/approve` :
                   `inbox/${inboxId}/reject`;
  try {
    const body = action === 'reject' || action === 'downgrade' ? { reason: notes } : undefined;
    const r = await fetch(API + endpoint, { method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: body ? JSON.stringify(body) : '{}' });
    if (r.ok) { alert('Done!'); loadPanel('inbox'); }
    else { alert('Failed: ' + (await r.json()).detail); }
  } catch(e) { alert('Error: ' + e.message); }
}

// ---- Bridges ----
async function renderBridges(main) {
  const data = await fetchJSON(API + 'bridges');
  main.innerHTML = `<h2>Bridge Relations (${data.count})</h2>
    <div style="margin-bottom:12px">
      <select id="bridge-filter" onchange="renderBridgeList()">
        <option value="">All types</option>
        ${[...new Set(data.bridges.map(b=>b.bridge_type))].map(t=>`<option>${t}</option>`).join('')}
      </select>
    </div>
    <div id="bridge-list"></div>`;
  window._bridges = data.bridges;
  renderBridgeList();
}

function renderBridgeList() {
  const type = $('#bridge-filter')?.value||'';
  const bridges = (window._bridges||[]).filter(b => !type || b.bridge_type === type);
  $('#bridge-list').innerHTML = bridges.map(b => {
    const statusMap = {active:'green',candidate:'yellow',rejected:'red'};
    return `
    <div class="card">
      <h3>${badge(b.bridge_type,'blue')} ${badge(b.review_status, statusMap[b.review_status]||'dim')}</h3>
      <div class="meta">${esc(b.source_key)} (graph: ${esc(b.source_graph_id)}) &harr; ${esc(b.target_key)} (graph: ${esc(b.target_graph_id)})</div>
      <div class="meta">Confidence: ${(b.bridge_confidence*100).toFixed(0)}% · Cost: ${b.traversal_cost}</div>
      ${b.warning ? `<div class="text" style="color:var(--yellow)">Warning: ${esc(b.warning)}</div>` : ''}
    </div>`;
  }).join('') || '<p style="color:var(--dim)">No bridges</p>';
}

// ---- Traces ----
async function renderTraces(main) {
  const data = await fetchJSON(API + 'traces');
  main.innerHTML = `<h2>Traversal Traces (${data.count})</h2><div id="trace-list"></div>`;
  window._traces = data.traces;
  $('#trace-list').innerHTML = data.traces.map(t => `
    <div class="card" onclick="viewTrace('${t.trace_id}')" style="cursor:pointer">
      <h3>${esc(t.query.substring(0,80))}</h3>
      <div class="meta">${esc(t.trace_id)} · ${t.created_at}</div>
    </div>`).join('') || '<p style="color:var(--dim)">No traces</p>';
}

async function viewTrace(tid) {
  const t = await fetchJSON(API + `traces/${tid}`);
  const main = $('#content');
  main.innerHTML = `<h2>Trace: ${esc(t.query)}</h2>
    <button onclick="loadPanel('traces')" style="margin-bottom:12px">&larr; Back</button>
    <h3>Plan</h3><pre>${esc(JSON.stringify(t.plan,null,2))}</pre>
    <h3>Result Summary</h3>
    <p>Nodes visited: ${(t.result?.visited_nodes||[]).length} · Edges: ${(t.result?.visited_edges||[]).length}</p>
    <p>Stopped: ${esc(t.result?.stopped_reason||'')} · Cost: ${t.result?.total_traversal_cost||0}</p>
    <h3>Visited Nodes</h3>
    ${(t.result?.visited_nodes||[]).slice(0,30).map(n => `
      <div class="card"><strong>${esc(n.node_type)}</strong>: ${esc(n.title||n.text||'').substring(0,200)}</div>`).join('')}
    <h3>PromptPacket Preview</h3><pre>${esc(JSON.stringify(t.result,null,2).substring(0,5000))}</pre>`;
}

// ---- Series ----
async function renderSeries(main) {
  const data = await fetchJSON(API + 'series-groups');
  main.innerHTML = `<h2>Series Groups (${data.count})</h2><div id="series-list"></div>`;
  $('#series-list').innerHTML = data.groups.map(g => `
    <div class="card">
      <h3>${esc(g.name)}</h3>
      <div class="meta">Domain: ${esc(g.domain)} · Confidence: ${(g.confidence*100).toFixed(0)}%</div>
      <div class="meta">Graphs: ${esc(JSON.stringify(g.graph_ids))}</div>
      <div class="text">${esc(g.description||'')}</div>
    </div>`).join('') || '<p style="color:var(--dim)">No series groups</p>';
}

// ---- Stats ----
async function renderStats(main) {
  const stats = await fetchJSON(API + 'stats');
  main.innerHTML = `<h2>Database Statistics</h2>
    <div class="stats">${Object.entries(stats).map(([k,v]) => `
      <div class="stat"><div class="num">${v}</div><div class="label">${esc(k)}</div></div>`).join('')}
    </div>`;
}

// ---- Init ----
loadPanel('papers');

// Auto-refresh stats summary
(async function(){
  try {
    const stats = await fetchJSON(API + 'stats');
    $('#stat-summary').textContent = `${stats.paper_cards||0} papers · ${stats.claim_blocks||0} claims · ${stats.review_inbox||0} inbox`;
  } catch(e) {}
})();
</script>
</body>
</html>
