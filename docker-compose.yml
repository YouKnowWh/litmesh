services:
  litmesh:
    build: .
    container_name: litmesh
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      # ---- Global fallback ----
      - LITMESH_LLM_PROVIDER=${LITMESH_LLM_PROVIDER:-openai_compatible}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-deepseek-chat}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # ---- Extraction role (claim/evidence/limitation/concept) ----
      # Uses global fallback by default. Override to use a cheaper model:
      # LITMESH_EXTRACTION_MODEL=deepseek-chat
      # LITMESH_EXTRACTION_PROVIDER=openai_compatible
      - LITMESH_EXTRACTION_MODEL=${LITMESH_EXTRACTION_MODEL:-}
      - LITMESH_EXTRACTION_PROVIDER=${LITMESH_EXTRACTION_PROVIDER:-}
      - LITMESH_EXTRACTION_BASE_URL=${LITMESH_EXTRACTION_BASE_URL:-}
      - LITMESH_EXTRACTION_API_KEY=${LITMESH_EXTRACTION_API_KEY:-}
      # ---- Segment role (PDF page-window segmentation) ----
      - LITMESH_SEGMENT_MODEL=${LITMESH_SEGMENT_MODEL:-deepseek-chat}
      - LITMESH_SEGMENT_PROVIDER=${LITMESH_SEGMENT_PROVIDER:-openai_compatible}
      - LITMESH_SEGMENT_BASE_URL=${LITMESH_SEGMENT_BASE_URL:-https://api.deepseek.com/v1}
      - LITMESH_SEGMENT_API_KEY=${LITMESH_SEGMENT_API_KEY:-}
      - LITMESH_SEGMENT_REVIEW_MODEL=${LITMESH_SEGMENT_REVIEW_MODEL:-deepseek-v4-pro[1m]}
      # ---- Outsourced PDF structure parser ----
      # Optional remote MinerU/Markdown API. When set, parser=auto tries this
      # before local pdfplumber+LLM segmentation.
      - LITMESH_MINERU_API_URL=${LITMESH_MINERU_API_URL:-}
      - LITMESH_MINERU_API_TIMEOUT=${LITMESH_MINERU_API_TIMEOUT:-1800}
      - LITMESH_MINERU_API_BACKEND=${LITMESH_MINERU_API_BACKEND:-pipeline}
      - LITMESH_MINERU_API_RETURN_MD=${LITMESH_MINERU_API_RETURN_MD:-true}
      # Optional generic command template, e.g.
      # "magic-pdf -p {pdf} -o {output} -m auto"
      - LITMESH_MARKDOWN_COMMAND=${LITMESH_MARKDOWN_COMMAND:-}
      # ---- Review role (bridge/series/inbox) ----
      - LITMESH_REVIEW_MODEL=${LITMESH_REVIEW_MODEL:-}
      - LITMESH_REVIEW_PROVIDER=${LITMESH_REVIEW_PROVIDER:-}
      - LITMESH_REVIEW_BASE_URL=${LITMESH_REVIEW_BASE_URL:-}
      - LITMESH_REVIEW_API_KEY=${LITMESH_REVIEW_API_KEY:-}
      # ---- Compilation role (PromptPacket/knowledge query) ----
      - LITMESH_COMPILATION_MODEL=${LITMESH_COMPILATION_MODEL:-}
      - LITMESH_COMPILATION_PROVIDER=${LITMESH_COMPILATION_PROVIDER:-}
      - LITMESH_COMPILATION_BASE_URL=${LITMESH_COMPILATION_BASE_URL:-}
      - LITMESH_COMPILATION_API_KEY=${LITMESH_COMPILATION_API_KEY:-}
      # ---- Embedding: SiliconFlow ----
      - LITMESH_EMBED_PROVIDER=${LITMESH_EMBED_PROVIDER:-openai_compatible}
      - LITMESH_EMBED_MODEL=${LITMESH_EMBED_MODEL:-BAAI/bge-large-zh-v1.5}
      - LITMESH_EMBED_BASE_URL=${LITMESH_EMBED_BASE_URL:-https://api.siliconflow.cn/v1}
      - LITMESH_EMBED_API_KEY=${LITMESH_EMBED_API_KEY:-sk-olueugsredhhxmivvkwklrowwqhajockffwljwcezfmsbysf}
      - LITMESH_EMBED_DIMENSION=${LITMESH_EMBED_DIMENSION:-1024}
    restart: unless-stopped
